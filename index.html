<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Replit Login Page</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    
    <!-- Left Side: Form -->
    <div class="left-side">
      <div class="logo-header">
        <img src="assets/replit_logo.png" alt="Logo" width="30">
        <span>Replit Clone</span>
      </div>

      <h3>Create a Replit account</h3>

      <div class="social-login">
        <button><img src="assets/google.png" alt="Google Logo"> Continue with Google</button>
        <button><img src="assets/github.png" alt="GitHub Logo"> Continue with GitHub</button>
        <button><img src="assets/apple.png" alt="Apple Logo"> Continue with Apple</button>
      </div>

      <div class="or-separator">
        <span>Or</span>
      </div>

      <div class="email-login">
        <button><img src="assets/email.png" alt="email Logo"> Email &amp; Password</button>
        <button><img src="assets/key.png" alt="email Logo"> Single sign-on</button>
      </div>
    
      <h5 style="font-family: poppins;font-size: 10px; font-weight: 200;display: flex;align-content: center;justify-content: center;">signing up, you agree to our</h5> 
      <h5 style="font-family: poppins;font-size: 10px; font-weight: 200;display: flex;align-content: center;justify-content: center;"><a href="#">Terms of Service</a>&nbsp;and&nbsp;<a href="#">Privacy Policy</a>.</h5>
    </div>

    <!-- Right Side: Image -->
    <div class="right-side">
      <img src="assets/bgg.png" alt="bgg" width="100%">
    </div>

  </div>
</body>
</html>
